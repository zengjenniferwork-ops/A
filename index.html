    const baseColor = isGrad ? (h.match(/#[0-9a-fA-F]{3,8}/) || ['#2b5aed'])[0] : h;

    const convDark   = this.preset.conv   === 'dark';
    const bubbleDark = this.preset.bubble === 'dark';

    // ── colour tokens per UI mode (match reference screenshots) ──────────────
    const tok = darkUI ? {
      mockupBg       : '#1c1f26',
      listBg         : '#1c1f26',
      listBorder     : '#2c3040',
      chatBg         : '#14161c',
      chatbarBg      : '#1c1f26',
      chatbarBdr     : '#2c3040',
      inputbarBg     : '#1c1f26',
      inputbarBdr    : '#2c3040',
      inputBg        : '#14161c',
      rowAv          : '#353a47',
      rowLine        : '#353a47',
      rowMsg         : '#2a2f3c',
      bubbleLeftBg   : '#252a36',
      bubbleLeftLine : '#353a47',
      bav            : '#353a47',
    } : {
      mockupBg       : '#f5f6f7',
      listBg         : '#f7f8fa',
      listBorder     : '#eaeaea',
      chatBg         : '#f0f2f5',
      chatbarBg      : '#ffffff',
      chatbarBdr     : '#eaeaea',
      inputbarBg     : '#ffffff',
      inputbarBdr    : '#eaeaea',
      inputBg        : '#f0f2f5',
      rowAv          : '#d5d8e0',
      rowLine        : '#d8dae0',
      rowMsg         : '#e4e6eb',
      bubbleLeftBg   : '#ffffff',
      bubbleLeftLine : '#dde0e8',
      bav            : '#d5d8e0',
    };

    // Apply base UI colours
    const mockup  = document.getElementById('previewMockup');
    const list    = document.getElementById('cpmList');
    const chat    = document.getElementById('cpmChat');
    const chatbar = document.getElementById('cpmChatbar');
    const inputbar= document.getElementById('cpmInputbar');
    const inputEl = document.getElementById('cpmInput');

    if (mockup)   mockup.style.background           = tok.mockupBg;
    if (list)   { list.style.background             = tok.listBg;
                  list.style.borderRightColor        = tok.listBorder; }
    if (chat)     chat.style.background             = tok.chatBg;
    if (chatbar){ chatbar.style.background          = tok.chatbarBg;
                  chatbar.style.borderBottomColor   = tok.chatbarBdr; }
    if (inputbar){inputbar.style.background         = tok.inputbarBg;
                  inputbar.style.borderTopColor     = tok.inputbarBdr; }
    if (inputEl)  inputEl.style.background          = tok.inputBg;

    // Non-active rows
    document.querySelectorAll('#cpmList .cpm-row:not(.active) .cpm-av')
      .forEach(el => el.style.background = tok.rowAv);
    document.querySelectorAll('#cpmList .cpm-row:not(.active) .cpm-l')
      .forEach(el => el.style.background = el.classList.contains('msg') ? tok.rowMsg : tok.rowLine);

    // Chatbar content
    document.querySelectorAll('#cpmChatbar .cpm-av')
      .forEach(el => el.style.background = tok.rowAv);
    document.querySelectorAll('#cpmChatbar .cpm-l')
      .forEach(el => el.style.background = tok.rowLine);

    // Left (received) bubbles
    document.querySelectorAll('.cpm-bubble.l').forEach(el => {
      el.style.background = tok.bubbleLeftBg;
      el.style.boxShadow  = darkUI ? 'none' : '0 1px 2px rgba(0,0,0,0.06)';
    });
    document.querySelectorAll('.cpm-bubble.l .cpm-bline')
      .forEach(el => el.style.background = tok.bubbleLeftLine);

    // Bubble avatars
    document.querySelectorAll('.cpm-bav')
      .forEach(el => el.style.background = tok.bav);

    // ── Header (always theme color) ──────────────────────────────────────────
    const header = document.getElementById('cpmHeader');
    if (header) header.style.background = h;

    // ── Selected conversation row ─────────────────────────────────────────────
    const activeRow = document.getElementById('cpmActiveRow');
    if (activeRow) {
      const av    = activeRow.querySelector('.cpm-av');
      const lines = activeRow.querySelectorAll('.cpm-l');
      if (convDark) {
        // 深色：全主题色背景，内容变白
        activeRow.style.background = baseColor;
        if (av) av.style.background = 'rgba(255,255,255,0.28)';
        lines.forEach(l => l.style.background = l.classList.contains('msg')
          ? 'rgba(255,255,255,0.38)' : 'rgba(255,255,255,0.52)');
      } else {
        // 浅色：主题色极淡，内容跟随 UI 模式正常色
        activeRow.style.background = baseColor + '22';
        if (av) av.style.background = tok.rowAv;
        lines.forEach(l => l.style.background = l.classList.contains('msg')
          ? tok.rowMsg : tok.rowLine);
      }
    }

    // ── Right (sent) bubbles ──────────────────────────────────────────────────
    ['cpmBubble1','cpmBubble2'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (bubbleDark) {
        // 深色：全主题色，线条变白
        el.style.background = baseColor;
        el.querySelectorAll('.cpm-bline').forEach(b => b.style.background = 'rgba(255,255,255,0.55)');
      } else {
        // 浅色：主题色淡化
        el.style.background = baseColor + '4D';
        el.querySelectorAll('.cpm-bline').forEach(b => b.style.background = baseColor + '50');
      }
    });

    // ── Send button ───────────────────────────────────────────────────────────
    const send = document.getElementById('cpmSend');
    if (send) send.style.background = baseColor;
  },

  // Legacy alias — some sub-methods call renderClient
  renderClient() { this._updateMockup(); },

  /* ───────────────── modify default modal (master ON mode) ───────────────── */
  mdTempHex: null,
  mdTab: 'recommended',
  mdCustomType: 'solid',
  mdCustomSolidHex: '#2b5aed',
  mdCustomGrad1: '#a770f0',
  mdCustomGrad2: '#458bfa',

  openModifyDefaultModal() {
    this.mdTempHex = this.defaultHex;
    // Sync custom state from current default
    if (this.defaultHex && this.defaultHex.startsWith('linear-gradient')) {
      this.mdCustomType = 'gradient';
      const cols = this.defaultHex.match(/#[0-9a-fA-F]{3,8}/g);
      if (cols && cols.length >= 2) { this.mdCustomGrad1 = cols[0]; this.mdCustomGrad2 = cols[1]; }
    } else {
      this.mdCustomType = 'solid';
      if (this.defaultHex && !this.defaultHex.startsWith('linear')) this.mdCustomSolidHex = this.defaultHex;
    }
    this.mdTab = 'recommended';
    document.getElementById('modifyDefaultModal').style.display = 'flex';
    this._renderMdContent();
  },

  closeModifyDefaultModal() {
    document.getElementById('modifyDefaultModal').style.display = 'none';
  },

  onModifyOverlayClick(e) {
    if (e.target === document.getElementById('modifyDefaultModal')) this.closeModifyDefaultModal();
  },

  switchMdTab(tab) {
    this.mdTab = tab;
    document.getElementById('mdTab1').className = tab === 'recommended' ? 'tab active' : 'tab';
    document.getElementById('mdTab2').className = tab === 'custom'      ? 'tab active' : 'tab';
    this._renderMdContent();
  },

  _renderMdContent() {
    const el = document.getElementById('mdContent');
    if (!el) return;
    if (this.mdTab === 'recommended') {
      const solidItems = this.solids.map(item => `
        <div class="md-color-item${this.mdTempHex === item.hex ? ' selected' : ''}"
             onclick="app.mdSelectHex('${item.hex.replace(/'/g,"\\'")}')">
          <div class="md-swatch" style="background:${item.hex}"></div>
          <span class="md-name">${item.name}</span>
        </div>`).join('');
      const gradItems = this.gradients.map(item => `
        <div class="md-color-item${this.mdTempHex === item.hex ? ' selected' : ''}"
             onclick="app.mdSelectHex('${item.hex.replace(/'/g,"\\'")}')">
          <div class="md-swatch" style="background:${item.hex}"></div>
          <span class="md-name">${item.name}</span>
        </div>`).join('');
      el.innerHTML = `
        <div class="md-cat">单一颜色</div>
        <div class="md-color-grid">${solidItems}</div>
        <div class="md-cat" style="margin-top:14px;">渐变颜色</div>
        <div class="md-color-grid">${gradItems}</div>`;
    } else {
      // Custom tab: P2 (单一颜色) + P3 (渐变颜色)
      const isSolid = this.mdCustomType === 'solid';
      el.innerHTML = `
        <div class="at-sub-radios" style="margin:10px 0 14px;">
          <label class="at-sub-radio">
            <input type="radio" name="mdCustomType" value="solid" ${isSolid ? 'checked' : ''}
                   onchange="app.mdOnCustomTypeChange('solid')"> 单一颜色
          </label>
          <label class="at-sub-radio">
            <input type="radio" name="mdCustomType" value="gradient" ${!isSolid ? 'checked' : ''}
                   onchange="app.mdOnCustomTypeChange('gradient')"> 渐变颜色
          </label>
        </div>
        <div id="mdCustomSolidWrap" style="display:${isSolid ? '' : 'none'}">
          <div class="at-picker-row">
            <div class="at-picker-input" id="mdSolidInput" onclick="app.openColorPicker('mdSolid',0,this)">
              <div class="at-swatch" id="mdSolidSwatch" style="background:${this.mdCustomSolidHex}"></div>
              <span class="at-hex-text" id="mdSolidHexText">${this.mdCustomSolidHex.toUpperCase()}</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left:auto;flex-shrink:0;color:#909399"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div id="mdCustomGradWrap" style="display:${!isSolid ? '' : 'none'}">
          <div class="at-grad-preview" id="mdGradPreview"
               style="background:linear-gradient(90deg,${this.mdCustomGrad1},${this.mdCustomGrad2})"></div>
          <div class="at-picker-row" style="gap:10px;">
            <div class="at-picker-input" id="mdGrad1Input" onclick="app.openColorPicker('mdGrad1',0,this)" style="flex:1;">
              <div class="at-swatch" id="mdGrad1Swatch" style="background:${this.mdCustomGrad1}"></div>
              <span class="at-hex-text" id="mdGrad1HexText">${this.mdCustomGrad1.toUpperCase()}</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left:auto;flex-shrink:0;color:#909399"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="at-picker-input" id="mdGrad2Input" onclick="app.openColorPicker('mdGrad2',0,this)" style="flex:1;">
              <div class="at-swatch" id="mdGrad2Swatch" style="background:${this.mdCustomGrad2}"></div>
              <span class="at-hex-text" id="mdGrad2HexText">${this.mdCustomGrad2.toUpperCase()}</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left:auto;flex-shrink:0;color:#909399"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>`;
    }
  },

  mdSelectHex(hex) {
    this.mdTempHex = hex;
    this.previewHex = hex;
    this._updateMockup();
    this._renderMdContent();
  },

  mdOnCustomTypeChange(type) {
    this.mdCustomType = type;
    this._mdApplyCustomColor();
    this._renderMdContent();
  },

  mdAiGenerate() {
    const solidPalette = [
      '#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6',
      '#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16','#a855f7',
    ];
    const gradPalette = [
      ['#667eea','#764ba2'],['#f093fb','#f5576c'],['#4facfe','#00f2fe'],
      ['#43e97b','#38f9d7'],['#fa709a','#fee140'],['#30cfd0','#667eea'],
      ['#a18cd1','#fbc2eb'],['#a1c4fd','#c2e9fb'],['#fccb90','#d57eeb'],
      ['#e0c3fc','#8ec5fc'],['#d4fc79','#96e6a1'],['#ffecd2','#fcb69f'],
    ];
    if (this.mdCustomType === 'solid') {
      this.mdCustomSolidHex = solidPalette[Math.floor(Math.random() * solidPalette.length)];
    } else {
      const g = gradPalette[Math.floor(Math.random() * gradPalette.length)];
      this.mdCustomGrad1 = g[0];
      this.mdCustomGrad2 = g[1];
    }
    this._mdApplyCustomColor();
    this._renderMdContent();
    if (this._cpTarget) this.closeColorPicker();
  },

  _mdApplyCustomColor() {
    if (this.mdCustomType === 'solid') {
      this.mdTempHex = this.mdCustomSolidHex;
    } else {
      this.mdTempHex = `linear-gradient(135deg,${this.mdCustomGrad1} 0%,${this.mdCustomGrad2} 100%)`;
    }
    this.previewHex = this.mdTempHex;
    this._updateMockup();
  },

  mdOnCustomColor(val) {
    this.mdTempHex = val;
    this.previewHex = val;
    this._updateMockup();
  },

  confirmModifyDefault() {
    if (this.mdTempHex) {
      this.defaultHex = this.mdTempHex;
      this.previewHex = this.mdTempHex;
    }
    this.closeModifyDefaultModal();
    this._renderDefaultThemeDisplay();
    this._updateMockup();
  },

  /* ───────────────── modal ───────────────── */
  openModal() {
    document.getElementById('colorNameInput').value = '';
    document.getElementById('modalOverlay').style.display = 'flex';
    this.switchModalTab('solid');
  },
  closeModal() { document.getElementById('modalOverlay').style.display = 'none'; },
  onOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) this.closeModal(); },

  switchModalTab(type) {
    this.activeModalTab = type;
    document.querySelectorAll('.tab-group .tab').forEach((t, i) => {
      t.className = (i === 0 && type === 'solid') || (i === 1 && type === 'gradient') ? 'tab active' : 'tab';
    });
    const content = document.getElementById('modalContent');
    if (type === 'solid') {
      content.innerHTML = `
        <div class="color-row">
          <span class="color-row-label">选择颜色</span>
          <div class="color-input-wrapper" onclick="document.getElementById('sc1').click()" ondblclick="app.confirmAdd()">
            <div class="mini-swatch" style="background:${this.tempColors.c1}"></div>
            <span class="hex-display">${this.tempColors.c1}</span>
            <input type="color" id="sc1" value="${this.tempColors.c1}" oninput="app.updateTemp('c1',this.value)">
          </div>
        </div>
        <div class="hint">提示：双击颜色框可直接确认</div>`;
    } else {
      content.innerHTML = `
        <div class="color-row">
          <span class="color-row-label">起始颜色</span>
          <div class="color-input-wrapper" onclick="document.getElementById('gc1').click()">
            <div class="mini-swatch" style="background:${this.tempColors.c1}"></div>
            <span class="hex-display">${this.tempColors.c1}</span>
            <input type="color" id="gc1" value="${this.tempColors.c1}" oninput="app.updateTemp('c1',this.value)">
          </div>
        </div>
        <div class="color-row">
          <span class="color-row-label">结束颜色</span>
          <div class="color-input-wrapper" onclick="document.getElementById('gc2').click()">
            <div class="mini-swatch" style="background:${this.tempColors.c2}"></div>
            <span class="hex-display">${this.tempColors.c2}</span>
            <input type="color" id="gc2" value="${this.tempColors.c2}" oninput="app.updateTemp('c2',this.value)">
          </div>
        </div>
        <div class="grad-preview" style="background:linear-gradient(90deg,${this.tempColors.c1},${this.tempColors.c2})"
             ondblclick="app.confirmAdd()" title="双击直接确认"></div>
        <div class="hint">提示：双击渐变预览条可直接确认</div>`;
    }
  },

  updateTemp(key, val) { this.tempColors[key] = val; this.switchModalTab(this.activeModalTab); },

  confirmAdd() {
    const name = document.getElementById('colorNameInput').value.trim();
    if (this.activeModalTab === 'solid') {
      this.solids.push({
        name: name || ('自定义色 ' + (this.solids.filter(s => !s.isSystem).length + 1)),
        hex: this.tempColors.c1, isSystem: false, visible: true,
      });
    } else {
      const grad = 'linear-gradient(135deg,' + this.tempColors.c1 + ' 0%,' + this.tempColors.c2 + ' 100%)';
      this.gradients.push({
        name: name || ('渐变色 ' + (this.gradients.filter(g => !g.isSystem).length + 1)),
        hex: grad, isSystem: false, visible: true,
      });
    }
    this.closeModal();
    this.render();
  },
};

// Default: master toggle OFF (admin sets everything)
document.getElementById('masterToggle').checked = false;
app.perm = { hex: false, conv: false, bubble: false };
// Sync custom solid hex with current default
app.adminCustomSolidHex = app.defaultHex;
app.render();
app._snapshot();
</script>

<!-- ── Custom Color Picker Popup ── -->
<div id="colorPickerPopup" style="display:none;position:fixed;z-index:3000;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.22);border:1px solid #e4e7ed;width:228px;padding:12px;">
  <!-- SV canvas -->
  <canvas id="cpCanvas" width="204" height="140" style="display:block;border-radius:6px;cursor:crosshair;touch-action:none;"></canvas>
  <!-- Hue + preview row -->
  <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">

    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;color:#909399;cursor:default"><path d="M11.5 1.5a2.121 2.121 0 013 3L5 14l-4 1 1-4L11.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>

      <div id="cpHueThumb" style="position:absolute;top:50%;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.25);transform:translate(-50%,-50%);pointer-events:none;"></div>
    </div>
  </div>
  <!-- RGB inputs -->
  <div style="display:flex;gap:6px;margin-top:10px;">
    <div style="flex:1;text-align:center;">
      <input id="cpR" type="number" min="0" max="255" style="width:100%;border:1px solid #dcdfe6;border-radius:4px;padding:4px 0;text-align:center;font-size:13px;outline:none;" oninput="app.cpOnRgbInput()">
      <div style="font-size:11px;color:#909399;margin-top:2px;">R</div>
    </div>
    <div style="flex:1;text-align:center;">
      <input id="cpG" type="number" min="0" max="255" style="width:100%;border:1px solid #dcdfe6;border-radius:4px;padding:4px 0;text-align:center;font-size:13px;outline:none;" oninput="app.cpOnRgbInput()">
      <div style="font-size:11px;color:#909399;margin-top:2px;">G</div>
    </div>
    <div style="flex:1;text-align:center;">
      <input id="cpB" type="number" min="0" max="255" style="width:100%;border:1px solid #dcdfe6;border-radius:4px;padding:4px 0;text-align:center;font-size:13px;outline:none;" oninput="app.cpOnRgbInput()">
      <div style="font-size:11px;color:#909399;margin-top:2px;">B</div>
    </div>
    <!-- Mode selector placeholder -->
    <div style="flex-shrink:0;display:flex;align-items:flex-start;padding-top:4px;">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" style="color:#909399;cursor:default"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</div>

<!-- ── Coverage Confirmation Modal ── -->
<div id="coverageConfirmModal" onclick="app._onCoverageOverlay(event)"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;width:500px;padding:28px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,0.22);animation:popIn 0.18s ease;">

    <!-- Title -->
    <div style="font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:14px;line-height:1.5;">已有 <span id="covNTitle">128</span> 位成员自定义外观，确认关闭？</div>

    <!-- Body -->
    <div style="font-size:13px;color:#606266;line-height:1.8;margin-bottom:20px;">
      上述成员新增的自定义主题颜色将被清空，全员将统一同步为管理员设定的标准外观。新配置将于成员下次启动应用时生效。
    </div>

    <!-- Confirm checkbox -->
    <label style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#fff8f0;border:1.5px solid #fde0c0;border-radius:8px;cursor:pointer;margin-bottom:22px;" onclick="app._toggleCovCheck()">
      <div id="covCheckbox" style="margin-top:1px;width:16px;height:16px;border:1.5px solid #d0d3d8;border-radius:3px;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 0.15s,border-color 0.15s;position:relative;">
      </div>
      <span id="covCheckLabel" style="font-size:13px;color:#606266;line-height:1.6;">我已知晓此操作将重置全员外观设定，确认执行。</span>
    </label>

    <!-- Actions -->
    <div style="display:flex;justify-content:flex-end;gap:10px;">
      <button onclick="app.cancelCoverage()"
              style="padding:8px 22px;border:1px solid #dcdfe6;border-radius:6px;background:#fff;color:#606266;font-size:14px;cursor:pointer;font-family:inherit;transition:border-color 0.15s,color 0.15s;"
              onmouseover="this.style.borderColor='#999';this.style.color='#303133'"
              onmouseout="this.style.borderColor='#dcdfe6';this.style.color='#606266'">取消</button>
      <button id="covConfirmBtn" onclick="app._covChecked && app.confirmCoverage()"
              style="padding:8px 24px;background:#2b5aed;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity 0.15s;opacity:0.38;"
              onmouseover="this.style.opacity=app._covChecked?'0.88':'0.38'"
              onmouseout="this.style.opacity=app._covChecked?'1':'0.38'">确定</button>
    </div>
  </div>
</div>
